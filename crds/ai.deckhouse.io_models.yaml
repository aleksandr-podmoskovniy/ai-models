---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  labels:
    heritage: deckhouse
    module: ai-models
  name: models.ai.deckhouse.io
spec:
  group: ai.deckhouse.io
  names:
    categories:
    - ai-models
    kind: Model
    listKind: ModelList
    plural: models
    singular: model
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.progress
      name: Progress
      priority: 1
      type: string
    - jsonPath: .status.source.resolvedType
      name: Source
      type: string
    - jsonPath: .status.artifact.uri
      name: ArtifactURI
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Model is the namespaced public catalog object for team-scoped published models.

          Artifact-producing parts of spec are expected to become immutable after the
          controller accepts the object.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ModelSpec is the shared desired state for both Model and
              ClusterModel.
            properties:
              source:
                properties:
                  authSecretRef:
                    description: For namespaced Model, empty Namespace resolves to
                      the object's namespace.
                    properties:
                      name:
                        minLength: 1
                        type: string
                      namespace:
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  upload:
                    type: object
                  url:
                    minLength: 1
                    pattern: ^https:\/\/((www\.)?huggingface\.co|hf\.co)\/.+$
                    type: string
                type: object
                x-kubernetes-validations:
                - message: exactly one of source.url or source.upload must be specified
                  rule: '((has(self.url) && size(self.url) > 0 ? 1 : 0) + (has(self.upload)
                    ? 1 : 0)) == 1'
                - message: source.authSecretRef is only allowed for source.url
                  rule: 'has(self.upload) ? !has(self.authSecretRef) : true'
            required:
            - source
            type: object
            x-kubernetes-validations:
            - message: spec.source is immutable
              rule: self.source == oldSelf.source
          status:
            description: |-
              ModelStatus is the shared observed state for both Model and ClusterModel.
              It intentionally exposes only public-contract-facing state.
            properties:
              artifact:
                properties:
                  digest:
                    type: string
                  kind:
                    enum:
                    - OCI
                    type: string
                  mediaType:
                    type: string
                  sizeBytes:
                    format: int64
                    minimum: 1
                    type: integer
                  uri:
                    type: string
                type: object
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                format: int64
                type: integer
              phase:
                enum:
                - Pending
                - WaitForUpload
                - Publishing
                - Ready
                - Failed
                - Deleting
                type: string
              progress:
                description: |-
                  Progress reports bounded controller-computed completion percentage for upload
                  and publication flows when runtime progress is available.
                type: string
              resolved:
                properties:
                  architecture:
                    type: string
                  compatibleAcceleratorVendors:
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                  compatiblePrecisions:
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                  compatibleRuntimes:
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                  contextWindowTokens:
                    format: int64
                    minimum: 1
                    type: integer
                  family:
                    type: string
                  format:
                    type: string
                  framework:
                    type: string
                  minimumLaunch:
                    properties:
                      acceleratorCount:
                        format: int64
                        minimum: 1
                        type: integer
                      acceleratorMemoryGiB:
                        format: int64
                        minimum: 1
                        type: integer
                      placementType:
                        type: string
                      sharingMode:
                        type: string
                    type: object
                  parameterCount:
                    format: int64
                    minimum: 1
                    type: integer
                  quantization:
                    type: string
                  supportedEndpointTypes:
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                  task:
                    type: string
                type: object
              source:
                properties:
                  resolvedRevision:
                    type: string
                  resolvedType:
                    enum:
                    - HuggingFace
                    - Upload
                    type: string
                type: object
              upload:
                properties:
                  expiresAt:
                    format: date-time
                    type: string
                  externalURL:
                    type: string
                  inClusterURL:
                    type: string
                  repository:
                    type: string
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
