- name: kubernetes.ai_models.dmcr_state
  rules:
    - alert: D8AIModelsDMCRTargetDown
      expr: max by (service, namespace) (up{namespace="d8-ai-models", service="dmcr"}) == 0
      for: 1m
      labels:
        severity_level: "6"
        tier: cluster
      annotations:
        plk_protocol_version: "1"
        plk_markup_format: "markdown"
        plk_ignore_labels: "service,namespace"
        plk_create_group_if_not_exists__d8_ai_models_dmcr_health: "D8AIModelsDMCRHealth,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes"
        plk_grouped_by__d8_ai_models_dmcr_health: "D8AIModelsDMCRHealth,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes"
        summary: Prometheus cannot scrape the DMCR metrics.
        description: |
          The recommended course of action:
          1. Check the Pod status: `kubectl -n d8-ai-models get pod -l app.kubernetes.io/name=ai-models,app.kubernetes.io/component=dmcr`
          2. Or check the Pod logs: `kubectl -n d8-ai-models logs deploy/dmcr -c dmcr`

    - alert: D8AIModelsDMCRTargetAbsent
      expr: absent(up{namespace="d8-ai-models", service="dmcr"}) == 1
      for: 15m
      labels:
        severity_level: "6"
        tier: cluster
      annotations:
        plk_protocol_version: "1"
        plk_markup_format: "markdown"
        plk_ignore_labels: "service,namespace"
        plk_create_group_if_not_exists__d8_ai_models_dmcr_health: "D8AIModelsDMCRHealth,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes"
        plk_grouped_by__d8_ai_models_dmcr_health: "D8AIModelsDMCRHealth,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes"
        summary: There is no DMCR target in Prometheus.
        description: |
          The recommended course of action:
          1. Check the ServiceMonitor and Service status in `d8-monitoring` and `d8-ai-models`.
          2. Check the DMCR Pod status: `kubectl -n d8-ai-models get pod -l app.kubernetes.io/name=ai-models,app.kubernetes.io/component=dmcr`

    - alert: D8AIModelsDMCRPodIsNotReady
      expr: min by (pod) (kube_pod_status_ready{condition="true", namespace="d8-ai-models", pod=~"dmcr-[^-]+-[^-]+$"}) != 1
      for: 10m
      labels:
        severity_level: "6"
        tier: cluster
      annotations:
        plk_protocol_version: "1"
        plk_markup_format: "markdown"
        plk_labels_as_annotations: "pod"
        plk_create_group_if_not_exists__d8_ai_models_dmcr_health: "D8AIModelsDMCRHealth,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes"
        plk_grouped_by__d8_ai_models_dmcr_health: "D8AIModelsDMCRHealth,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes"
        summary: The DMCR Pod is NOT Ready.
        description: |
          The recommended course of action:
          1. Retrieve details of the Deployment: `kubectl -n d8-ai-models describe deploy dmcr`
          2. View the status of the Pod and try to figure out why it is not ready: `kubectl -n d8-ai-models describe pod {{ $labels.pod }}`

    - alert: D8AIModelsDMCRPodIsNotRunning
      expr: absent(kube_pod_status_phase{namespace="d8-ai-models", phase="Running", pod=~"dmcr-[^-]+-[^-]+$"})
      for: 10m
      labels:
        severity_level: "6"
        tier: cluster
      annotations:
        plk_protocol_version: "1"
        plk_markup_format: "markdown"
        plk_create_group_if_not_exists__d8_ai_models_dmcr_health: "D8AIModelsDMCRHealth,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes"
        plk_grouped_by__d8_ai_models_dmcr_health: "D8AIModelsDMCRHealth,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes"
        summary: The DMCR Pod is NOT Running.
        description: |
          The recommended course of action:
          1. Retrieve details of the Deployment: `kubectl -n d8-ai-models describe deploy dmcr`
          2. View the Pod status: `kubectl -n d8-ai-models get pod -l app.kubernetes.io/name=ai-models,app.kubernetes.io/component=dmcr`

    - alert: D8AIModelsDMCRInsufficientCapacityRisk
      expr: |
        min by (persistentvolumeclaim, namespace) (
          (kubelet_volume_stats_available_bytes{namespace="d8-ai-models", persistentvolumeclaim="dmcr"} < 5 * 1024 * 1024 * 1024)
          or
          (kubelet_volume_stats_available_bytes{namespace="d8-ai-models", persistentvolumeclaim="dmcr"} / (kubelet_volume_stats_capacity_bytes / 100) < 20)
        )
      for: 10m
      labels:
        severity_level: "6"
        tier: cluster
      annotations:
        plk_protocol_version: "1"
        plk_markup_format: "markdown"
        plk_create_group_if_not_exists__d8_ai_models_dmcr_health: "D8AIModelsDMCRHealth,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes"
        plk_grouped_by__d8_ai_models_dmcr_health: "D8AIModelsDMCRHealth,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes"
        summary: Risk of insufficient DMCR storage capacity.
        description: |
          The DMCR storage (PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }}) has less than 5GB or 20% free space, risking failure to publish new model artifacts.

          The recommended course of action:

          - Check PVC details: `kubectl -n d8-ai-models describe pvc dmcr`
          - Extend `aiModels.publicationStorage.persistentVolumeClaim.storageSize` or remove unnecessary published artifacts.

