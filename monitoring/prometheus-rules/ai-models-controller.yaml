- name: kubernetes.ai_models.controller_state
  rules:
    - alert: D8AIModelsControllerTargetDown
      expr: max by (service, namespace) (up{namespace="d8-ai-models", service="ai-models-controller"}) == 0
      for: 1m
      labels:
        severity_level: "6"
        tier: cluster
      annotations:
        plk_protocol_version: "1"
        plk_markup_format: "markdown"
        plk_ignore_labels: "service,namespace"
        plk_create_group_if_not_exists__d8_ai_models_health: "D8AIModelsHealth,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes"
        plk_grouped_by__d8_ai_models_health: "D8AIModelsHealth,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes"
        summary: Prometheus cannot scrape the ai-models controller metrics.
        description: |
          The recommended course of action:
          1. Check the Pod status: `kubectl -n d8-ai-models get pod -l app.kubernetes.io/name=ai-models,app.kubernetes.io/component=controller`
          2. Or check the Pod logs: `kubectl -n d8-ai-models logs deploy/ai-models-controller -c controller`

    - alert: D8AIModelsControllerTargetAbsent
      expr: absent(up{namespace="d8-ai-models", service="ai-models-controller"}) == 1
      for: 15m
      labels:
        severity_level: "6"
        tier: cluster
      annotations:
        plk_protocol_version: "1"
        plk_markup_format: "markdown"
        plk_ignore_labels: "service,namespace"
        plk_create_group_if_not_exists__d8_ai_models_health: "D8AIModelsHealth,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes"
        plk_grouped_by__d8_ai_models_health: "D8AIModelsHealth,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes"
        summary: There is no ai-models controller target in Prometheus.
        description: |
          The recommended course of action:
          1. Check the ServiceMonitor and Service status in `d8-monitoring` and `d8-ai-models`.
          2. Check the controller Pod status: `kubectl -n d8-ai-models get pod -l app.kubernetes.io/name=ai-models,app.kubernetes.io/component=controller`

    - alert: D8AIModelsControllerPodIsNotReady
      expr: min by (pod) (kube_pod_status_ready{condition="true", namespace="d8-ai-models", pod=~"ai-models-controller-.*"}) != 1
      for: 10m
      labels:
        severity_level: "6"
        tier: cluster
      annotations:
        plk_protocol_version: "1"
        plk_markup_format: "markdown"
        plk_labels_as_annotations: "pod"
        plk_create_group_if_not_exists__d8_ai_models_health: "D8AIModelsHealth,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes"
        plk_grouped_by__d8_ai_models_health: "D8AIModelsHealth,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes"
        summary: The ai-models controller Pod is NOT Ready.
        description: |
          The recommended course of action:
          1. Retrieve details of the Deployment: `kubectl -n d8-ai-models describe deploy ai-models-controller`
          2. View the status of the Pod and try to figure out why it is not ready: `kubectl -n d8-ai-models describe pod {{ $labels.pod }}`

    - alert: D8AIModelsControllerPodIsNotRunning
      expr: absent(kube_pod_status_phase{namespace="d8-ai-models", phase="Running", pod=~"ai-models-controller-.*"})
      for: 10m
      labels:
        severity_level: "6"
        tier: cluster
      annotations:
        plk_protocol_version: "1"
        plk_markup_format: "markdown"
        plk_create_group_if_not_exists__d8_ai_models_health: "D8AIModelsHealth,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes"
        plk_grouped_by__d8_ai_models_health: "D8AIModelsHealth,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes"
        summary: The ai-models controller Pod is NOT Running.
        description: |
          The recommended course of action:
          1. Retrieve details of the Deployment: `kubectl -n d8-ai-models describe deploy ai-models-controller`
          2. View the Pod status: `kubectl -n d8-ai-models get pod -l app.kubernetes.io/name=ai-models,app.kubernetes.io/component=controller`

