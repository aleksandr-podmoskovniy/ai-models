{{- if (include "ai-models.isEnabled" .) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: access-to-ai-models-prometheus-metrics
  namespace: {{ include "ai-models.namespace" . }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models")) | nindent 2 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments/prometheus-metrics"]
    resourceNames:
      - {{ include "ai-models.controllerName" . }}
      - {{ include "ai-models.dmcrName" . }}
    verbs: ["get"]
{{- if (.Values.global.enabledModules | has "prometheus") }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: access-to-ai-models-prometheus-metrics
  namespace: {{ include "ai-models.namespace" . }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: access-to-ai-models-prometheus-metrics
subjects:
  - kind: User
    name: d8-monitoring:scraper
  - kind: ServiceAccount
    name: prometheus
    namespace: d8-monitoring
{{- end }}
{{- end }}
