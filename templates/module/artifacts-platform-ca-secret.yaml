{{- if and (include "ai-models.isEnabled" .) (include "ai-models.hasPlatformTrustCA" .) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-models.artifactsPlatformCASecretName" . }}
  namespace: {{ include "ai-models.namespace" . }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "artifacts")) | nindent 2 }}
type: Opaque
data:
  ca.crt: {{ include "ai-models.platformTrustCA" . | b64enc | quote }}
{{- end }}
