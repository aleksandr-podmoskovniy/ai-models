{{- if (include "ai-models.isEnabled" .) }}
{{- include "ai-models.validate" . }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-models.configMapName" . }}
  namespace: {{ include "ai-models.namespace" . }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "backend")) | nindent 2 }}
data:
  start-backend.sh: |
    #!/bin/sh
    set -eu

    backend_store_uri="$(ai-models-backend-runtime render-db-uri)"
    auth_store_uri="$(ai-models-backend-runtime render-auth-db-uri)"
    backend_log_level="$(printf '%s' "${AI_MODELS_LOG_LEVEL}" | tr '[:upper:]' '[:lower:]')"
    platform_ca_file="/etc/ai-models/platform-ca/ca.crt"
    s3_ca_file="${AI_MODELS_S3_CA_FILE:-${platform_ca_file}}"
    tls_trust_bundle="/tmp/ai-models-trust-bundle.crt"
    tls_trust_initialized="false"

    append_tls_trust() {
      ca_file="$1"
      if [ -z "${ca_file}" ] || [ ! -s "${ca_file}" ]; then
        return 0
      fi

      if [ "${tls_trust_initialized}" = "false" ]; then
        if [ -s /etc/ssl/certs/ca-certificates.crt ]; then
          cp /etc/ssl/certs/ca-certificates.crt "${tls_trust_bundle}"
        else
          : > "${tls_trust_bundle}"
        fi
        tls_trust_initialized="true"
      fi

      printf '\n' >> "${tls_trust_bundle}"
      cat "${ca_file}" >> "${tls_trust_bundle}"
    }

    append_tls_trust "${platform_ca_file}"
    append_tls_trust "${s3_ca_file}"

    if [ "${tls_trust_initialized}" = "true" ]; then
      export SSL_CERT_FILE="${tls_trust_bundle}"
      export REQUESTS_CA_BUNDLE="${tls_trust_bundle}"
      export CURL_CA_BUNDLE="${tls_trust_bundle}"
      export AWS_CA_BUNDLE="${tls_trust_bundle}"
    fi

    export GUNICORN_CMD_ARGS="--log-level ${backend_log_level}"
    export MLFLOW_ENABLE_WORKSPACES="true"
    export SECRET_KEY="${AI_MODELS_AUTH_SESSION_SECRET_KEY}"
    export OIDC_USERS_DB_URI="${auth_store_uri}"
    export OIDC_ALEMBIC_VERSION_TABLE="{{ include "ai-models.backendAuthOIDCAlembicVersionTable" . }}"
    export OIDC_DISCOVERY_URL="{{ include "ai-models.dexDiscoveryURL" . }}"
    export OIDC_CLIENT_ID="{{ include "ai-models.dexClientID" . }}"
    export OIDC_REDIRECT_URI="{{ include "ai-models.dexRedirectURI" . }}"
    export OIDC_SCOPE="openid email profile groups"
    export OIDC_GROUPS_ATTRIBUTE="groups"
    export OIDC_PROVIDER_DISPLAY_NAME="{{ include "ai-models.authSSOProviderDisplayName" . }}"
    export OIDC_GROUP_NAME="{{ include "ai-models.authSSOAllowedGroupsCSV" . }}"
    export OIDC_ADMIN_GROUP_NAME="{{ include "ai-models.authSSOAdminGroupsCSV" . }}"
    export OIDC_GEN_AI_GATEWAY_ENABLED="true"
    export AUTOMATIC_LOGIN_REDIRECT="{{ include "ai-models.authSSOAutomaticLoginRedirect" . }}"
    export DEFAULT_LANDING_PAGE_IS_PERMISSIONS="false"

    exec ai-models-backend server \
      --app-name="oidc-auth" \
      --backend-store-uri="${backend_store_uri}" \
      --registry-store-uri="${backend_store_uri}" \
      --workspace-store-uri="${backend_store_uri}" \
      --default-artifact-root="${AI_MODELS_ARTIFACT_ROOT}" \
      --no-serve-artifacts \
      --enable-workspaces \
      --host="0.0.0.0" \
      --port="${AI_MODELS_HTTP_PORT}" \
      --workers="1" \
      --allowed-hosts="{{ include "ai-models.backendAllowedHosts" . }}" \
      --cors-allowed-origins="{{ include "ai-models.backendCORSAllowedOrigins" . }}" \
      --expose-prometheus="{{ include "ai-models.backendMetricsDir" . }}"
  upgrade-db.sh: |
    #!/bin/sh
    set -eu

    exec ai-models-backend-db-upgrade
  aws-config: |
    [default]
    region = {{ include "ai-models.artifactsRegion" . }}
    s3 =
      addressing_style = {{ include "ai-models.artifactsUsePathStyle" . }}
{{- end }}
