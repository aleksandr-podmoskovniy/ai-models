{{- if (include "ai-models.isEnabled" .) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-models.fullname" . }}
  namespace: {{ include "ai-models.namespace" . }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "backend")) | nindent 2 }}
spec:
  replicas: {{ include "ai-models.backendReplicas" . | int }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      {{- include "ai-models.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "ai-models.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      annotations:
        checksum/runtime-config: {{ include "ai-models/templates/backend/configmap.yaml" . | sha256sum }}
    spec:
      {{- if (include "ai-models.hasRegistrySecret" .) }}
      imagePullSecrets:
        - name: {{ include "ai-models.registrySecretName" . }}
      {{- end }}
      serviceAccountName: {{ include "ai-models.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- include "helm_lib_module_pod_security_context_run_as_user_deckhouse_with_writable_fs" . | nindent 6 }}
      initContainers:
        - name: db-upgrade
          image: {{ include "helm_lib_module_image" (list . "backend") }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /opt/ai-models/bin/upgrade-db.sh
          env:
            - name: AI_MODELS_DATABASE_HOST
              value: {{ include "ai-models.postgresqlHost" . | quote }}
            - name: AI_MODELS_DATABASE_PORT
              value: {{ include "ai-models.postgresqlPort" . | quote }}
            - name: AI_MODELS_DATABASE_NAME
              value: {{ include "ai-models.postgresqlDatabase" . | quote }}
            - name: AI_MODELS_DATABASE_USER
              value: {{ include "ai-models.postgresqlUser" . | quote }}
            - name: AI_MODELS_DATABASE_SSLMODE
              value: {{ include "ai-models.postgresqlSSLMode" . | quote }}
            - name: AI_MODELS_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-models.postgresqlPasswordSecretName" . }}
                  key: {{ include "ai-models.postgresqlPasswordSecretKey" . }}
            - name: HOME
              value: /tmp
          volumeMounts:
            - name: runtime-config
              mountPath: /opt/ai-models/bin
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 64535
            runAsGroup: 64535
            seccompProfile:
              type: RuntimeDefault
        - name: auth-bootstrap
          image: {{ include "helm_lib_module_image" (list . "backend") }}
          imagePullPolicy: IfNotPresent
          command:
            - ai-models-backend-bootstrap-oidc-auth
          env:
            - name: AI_MODELS_DATABASE_HOST
              value: {{ include "ai-models.postgresqlHost" . | quote }}
            - name: AI_MODELS_DATABASE_PORT
              value: {{ include "ai-models.postgresqlPort" . | quote }}
            - name: AI_MODELS_DATABASE_NAME
              value: {{ include "ai-models.postgresqlDatabase" . | quote }}
            - name: AI_MODELS_DATABASE_USER
              value: {{ include "ai-models.postgresqlUser" . | quote }}
            - name: AI_MODELS_DATABASE_SSLMODE
              value: {{ include "ai-models.postgresqlSSLMode" . | quote }}
            - name: AI_MODELS_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-models.postgresqlPasswordSecretName" . }}
                  key: {{ include "ai-models.postgresqlPasswordSecretKey" . }}
            - name: AI_MODELS_AUTH_MACHINE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-models.backendAuthSecretName" . }}
                  key: machineUsername
            - name: AI_MODELS_AUTH_MACHINE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-models.backendAuthSecretName" . }}
                  key: machinePassword
            - name: OIDC_ALEMBIC_VERSION_TABLE
              value: {{ include "ai-models.backendAuthOIDCAlembicVersionTable" . | quote }}
            - name: HOME
              value: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 64535
            runAsGroup: 64535
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: backend
          image: {{ include "helm_lib_module_image" (list . "backend") }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /opt/ai-models/bin/start-backend.sh
          env:
            - name: AI_MODELS_HTTP_PORT
              value: {{ include "ai-models.backendPort" . | quote }}
            - name: AI_MODELS_LOG_LEVEL
              value: {{ default "Info" ((index ((index .Values "aiModels") | default dict) "logLevel") | default "Info") | quote }}
            - name: AI_MODELS_ARTIFACT_ROOT
              value: {{ include "ai-models.artifactsRoot" . | quote }}
            - name: AI_MODELS_DATABASE_HOST
              value: {{ include "ai-models.postgresqlHost" . | quote }}
            - name: AI_MODELS_DATABASE_PORT
              value: {{ include "ai-models.postgresqlPort" . | quote }}
            - name: AI_MODELS_DATABASE_NAME
              value: {{ include "ai-models.postgresqlDatabase" . | quote }}
            - name: AI_MODELS_DATABASE_USER
              value: {{ include "ai-models.postgresqlUser" . | quote }}
            - name: AI_MODELS_DATABASE_SSLMODE
              value: {{ include "ai-models.postgresqlSSLMode" . | quote }}
            - name: AI_MODELS_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-models.postgresqlPasswordSecretName" . }}
                  key: {{ include "ai-models.postgresqlPasswordSecretKey" . }}
            - name: AI_MODELS_S3_ENDPOINT_URL
              value: {{ include "ai-models.artifactsEndpoint" . | quote }}
            - name: AI_MODELS_S3_IGNORE_TLS
              value: {{ include "ai-models.artifactsIgnoreTLS" . | quote }}
            - name: AI_MODELS_AUTH_SESSION_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-models.backendAuthSecretName" . }}
                  key: flaskServerSecretKey
            - name: MLFLOW_FLASK_SERVER_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-models.backendAuthSecretName" . }}
                  key: flaskServerSecretKey
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-models.dexClientSecretName" . }}
                  key: clientSecret
            - name: MLFLOW_SERVER_ENABLE_JOB_EXECUTION
              value: "false"
            - name: MLFLOW_CRYPTO_KEK_PASSPHRASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-models.backendCryptoSecretName" . }}
                  key: kekPassphrase
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-models.artifactsResolvedSecretName" . }}
                  key: accessKey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-models.artifactsResolvedSecretName" . }}
                  key: secretKey
            - name: AWS_REGION
              value: {{ include "ai-models.artifactsRegion" . | quote }}
            - name: AWS_DEFAULT_REGION
              value: {{ include "ai-models.artifactsRegion" . | quote }}
            - name: AWS_EC2_METADATA_DISABLED
              value: "true"
            - name: AWS_CONFIG_FILE
              value: /etc/ai-models/aws/config
            - name: HOME
              value: /tmp
          ports:
            - name: http
              containerPort: {{ include "ai-models.backendPort" . | int }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: runtime-config
              mountPath: /opt/ai-models/bin
            - name: runtime-config
              mountPath: /etc/ai-models/aws/config
              subPath: aws-config
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 64535
            runAsGroup: 64535
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: runtime-config
          configMap:
            name: {{ include "ai-models.configMapName" . }}
            defaultMode: 0755
        - name: tmp
          emptyDir: {}
{{- end }}
