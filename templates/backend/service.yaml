{{- if (include "ai-models.isEnabled" .) }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-models.serviceName" . }}
  namespace: {{ include "ai-models.namespace" . }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "backend")) | nindent 2 }}
spec:
  selector:
    {{- include "ai-models.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
{{- end }}
