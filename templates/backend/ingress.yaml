{{- $globalValues := (index .Values "global") | default dict }}
{{- $modulesValues := (index $globalValues "modules") | default dict }}
{{- if and (include "ai-models.isEnabled" .) (default "" (index $modulesValues "publicDomainTemplate")) }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ai-models.fullname" . }}
  namespace: {{ include "ai-models.namespace" . }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "backend")) | nindent 2 }}
  annotations:
    web.deckhouse.io/export-name: "ai-models"
    nginx.ingress.kubernetes.io/proxy-body-size: "256m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    {{- if gt (include "ai-models.backendReplicas" . | int) 1 }}
    nginx.ingress.kubernetes.io/affinity: cookie
    nginx.ingress.kubernetes.io/affinity-mode: persistent
    nginx.ingress.kubernetes.io/session-cookie-name: ai-models-affinity
    {{- end }}
spec:
  ingressClassName: {{ include "helm_lib_module_ingress_class" . | quote }}
  rules:
    - host: {{ include "ai-models.publicHost" . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "ai-models.serviceName" . }}
                port:
                  name: http
  {{- if (include "helm_lib_module_https_ingress_tls_enabled" .) }}
  tls:
    - hosts:
        - {{ include "ai-models.publicHost" . }}
      secretName: {{ include "helm_lib_module_https_secret_name" (list . "ingress-tls") }}
  {{- end }}
{{ include "helm_lib_module_https_copy_custom_certificate" (list . (include "ai-models.namespace" .) "ingress-tls") }}
{{- if and (eq (include "helm_lib_module_https_mode" .) "CertManager") (include "ai-models.hasAPI" (list . "cert-manager.io/v1/Certificate")) }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "ai-models.fullname" . }}
  namespace: {{ include "ai-models.namespace" . }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "backend")) | nindent 2 }}
spec:
  certificateOwnerRef: false
  secretName: {{ include "helm_lib_module_https_secret_name" (list . "ingress-tls") }}
  {{ include "helm_lib_module_generate_common_name" (list . "ai-models") | nindent 2 }}
  dnsNames:
    - {{ include "ai-models.publicHost" . }}
  issuerRef:
    name: {{ include "helm_lib_module_https_cert_manager_cluster_issuer_name" . }}
    kind: ClusterIssuer
{{- end }}
{{- end }}
