{{- if and (include "ai-models.isEnabled" .) (eq (include "ai-models.postgresqlMode" .) "Managed") (include "ai-models.hasAPI" (list . "managed-services.deckhouse.io/v1alpha1/PostgresClass")) }}
{{- $managed := (index ((index ((index .Values "aiModels") | default dict) "postgresql") | default dict) "managed") | default dict }}
{{- if (default false (index $managed "createPostgresClass")) }}
---
apiVersion: managed-services.deckhouse.io/v1alpha1
kind: PostgresClass
metadata:
  name: {{ default "default" (index $managed "postgresClassName") }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "managed-postgres" "component" "postgres-class")) | nindent 2 }}
spec:
  topology:
    allowedTopologies:
      - Zonal
      - TransZonal
      - Ignored
    allowedZones: []
    defaultTopology: Zonal
  sizingPolicies:
    - cores:
        min: 1
        max: 4
      memory:
        min: 1Gi
        max: 8Gi
        step: 1Gi
      coreFractions:
        - 10
        - 50
        - 100
  overridableConfiguration:
    - maxConnections
    - sharedBuffers
  configuration:
    maxConnections: 200
{{- end }}
{{- end }}
