{{- if (include "ai-models.isEnabled" .) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-models-ca
  namespace: {{ include "ai-models.namespace" . }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "root-ca")) | nindent 2 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ .Values.aiModels.internal.rootCA.crt }}
  tls.key: {{ .Values.aiModels.internal.rootCA.key }}
{{- end }}
