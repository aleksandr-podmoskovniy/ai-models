{{- if (include "ai-models.isEnabled" .) }}
{{- $namespace := include "ai-models.namespace" . -}}
{{- $serviceName := include "ai-models.controllerServiceName" . -}}
{{- $tlsSecretName := include "ai-models.controllerWebhookTLSSecretName" . -}}
{{- $existingTLSSecret := lookup "v1" "Secret" $namespace $tlsSecretName -}}
{{- $existingTLSData := (get (default (dict) $existingTLSSecret) "data") | default dict -}}
{{- $existingCACert := (get $existingTLSData "ca.crt" | default "" | b64dec) -}}
{{- $existingCAKey := (get $existingTLSData "ca.key" | default "" | b64dec) -}}
{{- $existingTLSCert := (get $existingTLSData "tls.crt" | default "" | b64dec) -}}
{{- $existingTLSKey := (get $existingTLSData "tls.key" | default "" | b64dec) -}}
{{- $serviceHost := printf "%s.%s.svc" $serviceName $namespace -}}
{{- $alternateNames := list $serviceName (printf "%s.%s" $serviceName $namespace) $serviceHost -}}
{{- $hasExistingBundle := and $existingCACert $existingCAKey $existingTLSCert $existingTLSKey -}}
{{- $caCert := $existingCACert -}}
{{- $caKey := $existingCAKey -}}
{{- $tlsCert := $existingTLSCert -}}
{{- $tlsKey := $existingTLSKey -}}
{{- if not $hasExistingBundle -}}
  {{- $generatedCA := genCA "ai-models-controller-webhook-ca" 3650 -}}
  {{- $generatedTLS := genSignedCert $serviceHost nil $alternateNames 3650 $generatedCA -}}
  {{- $caCert = $generatedCA.Cert -}}
  {{- $caKey = $generatedCA.Key -}}
  {{- $tlsCert = $generatedTLS.Cert -}}
  {{- $tlsKey = $generatedTLS.Key -}}
{{- end -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $tlsSecretName }}
  namespace: {{ $namespace }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "controller" "part" "webhook-tls")) | nindent 2 }}
type: Opaque
stringData:
  ca.crt: |
{{ $caCert | nindent 4 }}
  ca.key: |
{{ $caKey | nindent 4 }}
  tls.crt: |
{{ $tlsCert | nindent 4 }}
  tls.key: |
{{ $tlsKey | nindent 4 }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: ai-models-workload-delivery
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "controller" "part" "workload-delivery-webhook")) | nindent 2 }}
webhooks:
  - name: workloaddelivery.ai-models.deckhouse.io
    admissionReviewVersions: ["v1"]
    failurePolicy: Ignore
    matchPolicy: Equivalent
    matchConditions:
      - name: ai-models-workload-reference
        expression: "has(object.metadata.annotations) && ('ai.deckhouse.io/model' in object.metadata.annotations || 'ai.deckhouse.io/clustermodel' in object.metadata.annotations)"
    reinvocationPolicy: Never
    sideEffects: None
    timeoutSeconds: 2
    clientConfig:
      service:
        namespace: {{ $namespace }}
        name: {{ $serviceName }}
        path: /mutate-ai-deckhouse-io-workload-delivery
        port: {{ include "ai-models.controllerWebhookPort" . | int }}
      caBundle: {{ $caCert | b64enc | quote }}
    rules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments", "statefulsets", "daemonsets"]
        scope: Namespaced
{{- end }}
