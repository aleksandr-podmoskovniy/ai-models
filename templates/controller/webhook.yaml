{{- if (include "ai-models.isEnabled" .) }}
{{- $namespace := include "ai-models.namespace" . -}}
{{- $serviceName := include "ai-models.controllerServiceName" . -}}
{{- $tlsSecretName := include "ai-models.controllerWebhookTLSSecretName" . -}}
{{- $cert := .Values.aiModels.internal.controller.cert -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $tlsSecretName }}
  namespace: {{ $namespace }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "controller" "part" "webhook-tls")) | nindent 2 }}
type: kubernetes.io/tls
data:
  ca.crt: {{ $cert.ca | b64enc }}
  tls.crt: {{ $cert.crt | b64enc }}
  tls.key: {{ $cert.key | b64enc }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: ai-models-workload-delivery
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "controller" "part" "workload-delivery-webhook")) | nindent 2 }}
webhooks:
  - name: workloaddelivery.ai-models.deckhouse.io
    admissionReviewVersions: ["v1"]
    failurePolicy: Fail
    matchPolicy: Equivalent
    matchConditions:
      - name: ai-models-workload-reference
        expression: "has(object.metadata.annotations) && ('ai.deckhouse.io/model' in object.metadata.annotations || 'ai.deckhouse.io/clustermodel' in object.metadata.annotations || 'ai.deckhouse.io/model-refs' in object.metadata.annotations)"
    reinvocationPolicy: Never
    sideEffects: None
    timeoutSeconds: 2
    clientConfig:
      service:
        namespace: {{ $namespace }}
        name: {{ $serviceName }}
        path: /mutate-ai-deckhouse-io-workload-delivery
        port: {{ include "ai-models.controllerWebhookPort" . | int }}
      caBundle: {{ $cert.ca | b64enc | quote }}
    rules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments", "statefulsets", "daemonsets"]
        scope: Namespaced
      - apiGroups: ["batch"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["cronjobs"]
        scope: Namespaced
{{- end }}
