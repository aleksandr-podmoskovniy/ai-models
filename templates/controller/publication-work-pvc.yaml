{{- if and (include "ai-models.isEnabled" .) (eq (include "ai-models.publicationWorkVolumeType" . | trim) "PersistentVolumeClaim") }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ai-models.publicationWorkVolumePVCName" . }}
  namespace: {{ include "ai-models.namespace" . }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "controller-publication-work")) | nindent 2 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ include "ai-models.publicationWorkVolumePVCStorageSize" . | quote }}
  {{- if (include "ai-models.publicationWorkVolumePVCStorageClassName" . | trim) }}
  storageClassName: {{ include "ai-models.publicationWorkVolumePVCStorageClassName" . | quote }}
  {{- end }}
{{- end }}
