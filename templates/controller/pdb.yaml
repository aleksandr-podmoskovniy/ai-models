{{- if and (include "ai-models.isEnabled" .) (gt (include "ai-models.controllerReplicas" . | int) 1) }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "ai-models.controllerName" . }}
  namespace: {{ include "ai-models.namespace" . }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "controller")) | nindent 2 }}
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      {{- include "ai-models.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
{{- end }}
