{{- if (include "ai-models.isEnabled" .) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ai-models.controllerName" . }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "controller")) | nindent 2 }}
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["ai.deckhouse.io"]
    resources: ["models", "clustermodels"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["ai.deckhouse.io"]
    resources: ["models/status", "clustermodels/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["ai.deckhouse.io"]
    resources: ["models/finalizers", "clustermodels/finalizers"]
    verbs: ["update"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["storage.deckhouse.io"]
    resources: ["lvmvolumegroupsets", "lvmvolumegroups", "localstorageclasses"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["storage.deckhouse.io"]
    resources: ["lvmvolumegroupsets/status"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ai-models.controllerName" . }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "controller")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ai-models.controllerName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ai-models.controllerServiceAccountName" . }}
    namespace: {{ include "ai-models.namespace" . }}
{{- end }}
