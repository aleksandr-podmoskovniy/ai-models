{{- if (include "ai-models.isEnabled" .) }}
{{- $priorityClassName := include "ai-models.priorityClassName" . -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-models.controllerName" . }}
  namespace: {{ include "ai-models.namespace" . }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "controller")) | nindent 2 }}
spec:
  replicas: {{ include "ai-models.controllerReplicas" . | int }}
  {{- if (include "helm_lib_ha_enabled" .) }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  {{- end }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      {{- include "ai-models.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "ai-models.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
      annotations:
        checksum/webhook-tls: {{ include (print $.Template.BasePath "/controller/webhook.yaml") . | sha256sum }}
        kubectl.kubernetes.io/default-container: controller
    spec:
      {{- if (include "ai-models.hasRegistrySecret" .) }}
      imagePullSecrets:
        - name: {{ include "ai-models.registrySecretName" . }}
      {{- end }}
      serviceAccountName: {{ include "ai-models.controllerServiceAccountName" . }}
      automountServiceAccountToken: false
      {{- include "helm_lib_module_pod_security_context_run_as_user_deckhouse_with_writable_fs" . | nindent 6 }}
      {{- include "helm_lib_pod_anti_affinity_for_ha" (list . (dict "app.kubernetes.io/name" (include "ai-models.fullname" .) "app.kubernetes.io/component" "controller")) | nindent 6 }}
      {{- include "helm_lib_priority_class" (tuple . $priorityClassName) | nindent 6 }}
      {{- include "helm_lib_node_selector" (tuple . "system") | nindent 6 }}
      {{- include "helm_lib_tolerations" (tuple . "system") | nindent 6 }}
      containers:
        - name: controller
          {{- include "helm_lib_module_container_security_context_read_only_root_filesystem_capabilities_drop_all_pss_restricted" . | nindent 10 }}
          image: {{ include "helm_lib_module_image" (list . "controller") }}
          imagePullPolicy: IfNotPresent
          args:
            - --metrics-bind-address=127.0.0.1:{{ include "ai-models.controllerMetricsPort" . }}
            - --health-probe-bind-address=:{{ include "ai-models.controllerHealthPort" . }}
            - --leader-elect=true
            - --leader-election-id={{ include "ai-models.controllerLeaderElectionID" . }}
            - --leader-election-namespace=$(POD_NAMESPACE)
            - --publication-worker-image={{ include "helm_lib_module_image" (list . "controllerRuntime") }}
            - --publication-worker-image-pull-secret-name={{ include "ai-models.registrySecretName" . }}
            - --publication-worker-namespace=$(POD_NAMESPACE)
            - --publication-worker-service-account={{ include "ai-models.publicationWorkerServiceAccountName" . }}
            - --publication-max-concurrent-workers={{ include "ai-models.publicationMaxConcurrentWorkers" . }}
            - --publication-worker-cpu-request={{ include "ai-models.publicationWorkerCPURequest" . }}
            - --publication-worker-cpu-limit={{ include "ai-models.publicationWorkerCPULimit" . }}
            - --publication-worker-memory-request={{ include "ai-models.publicationWorkerMemoryRequest" . }}
            - --publication-worker-memory-limit={{ include "ai-models.publicationWorkerMemoryLimit" . }}
            - --publication-worker-ephemeral-storage-request={{ include "ai-models.publicationWorkerEphemeralStorageRequest" . }}
            - --publication-worker-ephemeral-storage-limit={{ include "ai-models.publicationWorkerEphemeralStorageLimit" . }}
            - --publication-oci-repository-prefix={{ include "ai-models.dmcrRepositoryPrefix" . }}
            - --publication-oci-insecure=false
            - --publication-oci-credentials-secret-name={{ include "ai-models.dmcrWriteAuthSecretName" . }}
            - --publication-oci-ca-secret-name={{ include "ai-models.dmcrCASecretName" . }}
            - --publication-oci-direct-upload-endpoint={{ include "ai-models.dmcrDirectUploadEndpoint" . }}
            - --publication-source-fetch-mode={{ include "ai-models.sourceFetchMode" . }}
            - --artifacts-bucket={{ include "ai-models.artifactsBucket" . }}
            - --artifacts-s3-endpoint-url={{ include "ai-models.artifactsEndpoint" . }}
            - --artifacts-s3-region={{ include "ai-models.artifactsRegion" . }}
            - --artifacts-s3-use-path-style={{ include "ai-models.artifactsUsePathStyleBool" . }}
            - --artifacts-s3-ignore-tls={{ include "ai-models.artifactsIgnoreTLS" . }}
            - --artifacts-credentials-secret-name={{ include "ai-models.artifactsResolvedSecretName" . }}
            - --artifacts-ca-secret-name={{ include "ai-models.artifactsMountedCASecretName" . }}
            - --artifacts-capacity-limit={{ include "ai-models.artifactsCapacityLimit" . }}
            - --node-cache-enabled={{ include "ai-models.nodeCacheEnabled" . }}
            - --node-cache-runtime-image={{ include "helm_lib_module_image" (list . "nodeCacheRuntime") }}
            - --node-cache-csi-registrar-image={{ include "ai-models.nodeCacheCSIRegistrarImage" . }}
            - --node-cache-max-size={{ include "ai-models.nodeCacheMaxSize" . }}
            - --node-cache-shared-volume-size={{ include "ai-models.nodeCacheSharedVolumeSize" . }}
            - --node-cache-storage-class-name={{ include "ai-models.nodeCacheStorageClassName" . }}
            - --node-cache-volume-group-set-name={{ include "ai-models.nodeCacheVolumeGroupSetName" . }}
            - --node-cache-volume-group-name-on-node={{ include "ai-models.nodeCacheVolumeGroupNameOnNode" . }}
            - --node-cache-thin-pool-name={{ include "ai-models.nodeCacheThinPoolName" . }}
            - {{ printf "--node-cache-node-selector-json=%s" (include "ai-models.nodeCacheNodeSelectorJSON" .) | quote }}
            - {{ printf "--node-cache-block-device-selector-json=%s" (include "ai-models.nodeCacheBlockDeviceSelectorJSON" .) | quote }}
            - --upload-service-name={{ include "ai-models.uploadGatewayServiceName" . }}
            - --upload-public-host={{ include "ai-models.uploadPublicHost" . }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: AI_MODELS_S3_ENDPOINT_URL
              value: {{ include "ai-models.artifactsEndpoint" . | quote }}
            - name: AI_MODELS_S3_REGION
              value: {{ include "ai-models.artifactsRegion" . | quote }}
            - name: AI_MODELS_S3_USE_PATH_STYLE
              value: {{ include "ai-models.artifactsUsePathStyleBool" . | quote }}
            - name: AI_MODELS_S3_IGNORE_TLS
              value: {{ include "ai-models.artifactsIgnoreTLS" . | quote }}
            - name: AWS_REGION
              value: {{ include "ai-models.artifactsRegion" . | quote }}
            - name: AWS_DEFAULT_REGION
              value: {{ include "ai-models.artifactsRegion" . | quote }}
            - name: AWS_EC2_METADATA_DISABLED
              value: "true"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-models.artifactsResolvedSecretName" . }}
                  key: accessKey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-models.artifactsResolvedSecretName" . }}
                  key: secretKey
            {{- if (include "ai-models.artifactsMountedCASecretName" . | trim) }}
            - name: AI_MODELS_S3_CA_FILE
              value: /etc/ai-models/artifacts-ca/ca.crt
            {{- end }}
            - name: AI_MODELS_OCI_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-models.dmcrWriteAuthSecretName" . }}
                  key: username
            - name: AI_MODELS_OCI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-models.dmcrWriteAuthSecretName" . }}
                  key: password
            - name: AI_MODELS_DELIVERY_AUTH_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-models.dmcrAuthSecretName" . }}
                  key: salt
            {{- if (include "ai-models.dmcrCASecretName" . | trim) }}
            - name: AI_MODELS_OCI_CA_FILE
              value: /etc/ai-models/registry-ca/ca.crt
            {{- end }}
            - name: LOG_FORMAT
              value: json
          volumeMounts:
            {{- if (include "ai-models.artifactsMountedCASecretName" . | trim) }}
            - name: artifacts-ca
              mountPath: /etc/ai-models/artifacts-ca
              readOnly: true
            {{- end }}
            {{- if (include "ai-models.dmcrCASecretName" . | trim) }}
            - name: registry-ca
              mountPath: /etc/ai-models/registry-ca
              readOnly: true
            {{- end }}
            - name: webhook-tls
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
            - name: controller-kube-api-access
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
          ports:
            - name: metrics
              containerPort: {{ include "ai-models.controllerMetricsPort" . | int }}
              protocol: TCP
            - name: health
              containerPort: {{ include "ai-models.controllerHealthPort" . | int }}
              protocol: TCP
            - name: webhook
              containerPort: {{ include "ai-models.controllerWebhookPort" . | int }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          resources:
            requests:
              {{- include "helm_lib_module_ephemeral_storage_only_logs" . | nindent 14 }}
              {{- if not (.Values.global.enabledModules | has "vertical-pod-autoscaler-crd") }}
              {{- include "ai-models.controllerResources" . | nindent 14 }}
              {{- end }}
            {{- if not (.Values.global.enabledModules | has "vertical-pod-autoscaler-crd") }}
            limits:
              cpu: 200m
              memory: 256Mi
            {{- end }}
        {{- $kubeRbacProxySettings := dict }}
        {{- $_ := set $kubeRbacProxySettings "portName" "https-metrics" }}
        {{- $_ := set $kubeRbacProxySettings "listenPort" "8443" }}
        {{- $_ := set $kubeRbacProxySettings "volumeMounts" (list
          (dict
            "name" "controller-kube-api-access"
            "mountPath" "/var/run/secrets/kubernetes.io/serviceaccount"
            "readOnly" true
          )
        ) }}
        {{- $_ := set $kubeRbacProxySettings "upstreams" (list
          (dict
            "upstream" (printf "http://127.0.0.1:%s/metrics" (include "ai-models.controllerMetricsPort" .))
            "path" "/metrics"
            "name" (include "ai-models.controllerName" .)
            "namespace" (include "ai-models.namespace" .)
          )
        ) }}
        {{- include "kube_rbac_proxy.sidecar_container" (tuple . $kubeRbacProxySettings) | nindent 8 }}
      volumes:
        {{- if (include "ai-models.artifactsMountedCASecretName" . | trim) }}
        - name: artifacts-ca
          secret:
            secretName: {{ include "ai-models.artifactsMountedCASecretName" . }}
        {{- end }}
        {{- if (include "ai-models.dmcrCASecretName" . | trim) }}
        - name: registry-ca
          secret:
            secretName: {{ include "ai-models.dmcrCASecretName" . }}
        {{- end }}
        - name: webhook-tls
          secret:
            secretName: {{ include "ai-models.controllerWebhookTLSSecretName" . }}
        - name: controller-kube-api-access
          projected:
            defaultMode: 0444
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3600
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        apiVersion: v1
                        fieldPath: metadata.namespace
{{- end }}
