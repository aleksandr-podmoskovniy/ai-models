{{- if and (include "ai-models.isEnabled" .) (.Values.global.enabledModules | has "vertical-pod-autoscaler-crd") }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "ai-models.dmcrName" . }}
  namespace: {{ include "ai-models.namespace" . }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "dmcr" "workload-resource-policy.deckhouse.io" "system")) | nindent 2 }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "ai-models.dmcrName" . }}
  updatePolicy:
    updateMode: {{ include "ai-models.vpaPolicyUpdateMode" . }}
  resourcePolicy:
    containerPolicies:
    {{- include "kube_rbac_proxy.vpa_container_policy" (dict "containerName" "kube-rbac-proxy") | nindent 4 }}
    - containerName: dmcr
      minAllowed:
        {{- include "ai-models.dmcrResources" . | nindent 8 }}
      maxAllowed:
        cpu: 300m
        memory: 512Mi
    - containerName: dmcr-garbage-collection
      minAllowed:
        {{- include "ai-models.dmcrGarbageCollectionResources" . | nindent 8 }}
      maxAllowed:
        cpu: 200m
        memory: 256Mi
{{- end }}
