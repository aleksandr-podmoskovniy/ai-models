{{- if (include "ai-models.isEnabled" .) }}
{{- $namespace := include "ai-models.namespace" . -}}
{{- $tlsSecretName := include "ai-models.dmcrTLSSecretName" . -}}
{{- $existingTLSSecret := lookup "v1" "Secret" $namespace $tlsSecretName -}}
{{- $existingTLSData := (get (default (dict) $existingTLSSecret) "data") | default dict -}}
{{- $existingCACert := (get $existingTLSData "ca.crt" | default "" | b64dec) -}}
{{- $existingCAKey := (get $existingTLSData "ca.key" | default "" | b64dec) -}}
{{- $existingTLSCert := (get $existingTLSData "tls.crt" | default "" | b64dec) -}}
{{- $existingTLSKey := (get $existingTLSData "tls.key" | default "" | b64dec) -}}
{{- $serviceName := include "ai-models.dmcrName" . -}}
{{- $serviceHost := include "ai-models.dmcrServiceHost" . -}}
{{- $serviceNamespaceHost := printf "%s.%s.svc" $serviceName $namespace -}}
{{- $alternateNames := list $serviceName (printf "%s.%s" $serviceName $namespace) $serviceNamespaceHost $serviceHost -}}
{{- $hasExistingBundle := and $existingCACert $existingCAKey $existingTLSCert $existingTLSKey -}}
{{- $caCert := $existingCACert -}}
{{- $caKey := $existingCAKey -}}
{{- $tlsCert := $existingTLSCert -}}
{{- $tlsKey := $existingTLSKey -}}
{{- $writePassword := include "ai-models.dmcrWriteAuthPassword" . | trim -}}
{{- $readPassword := include "ai-models.dmcrReadAuthPassword" . | trim -}}
{{- $writeHTPasswd := include "ai-models.dmcrWriteHTPasswdEntry" (list . $writePassword) | trim -}}
{{- $readHTPasswd := include "ai-models.dmcrReadHTPasswdEntry" (list . $readPassword) | trim -}}
{{- $writeHTPasswdChecksum := include "ai-models.dmcrPasswordChecksum" $writePassword | trim -}}
{{- $readHTPasswdChecksum := include "ai-models.dmcrPasswordChecksum" $readPassword | trim -}}
{{- if not $hasExistingBundle -}}
  {{- $generatedCA := genCA "ai-models-dmcr-ca" 3650 -}}
  {{- $generatedTLS := genSignedCert $serviceHost nil $alternateNames 3650 $generatedCA -}}
  {{- $caCert = $generatedCA.Cert -}}
  {{- $caKey = $generatedCA.Key -}}
  {{- $tlsCert = $generatedTLS.Cert -}}
  {{- $tlsKey = $generatedTLS.Key -}}
{{- end -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-models.dmcrTLSSecretName" . }}
  namespace: {{ $namespace }}
  annotations:
    {{ include "ai-models.dmcrSecretRestartChecksumAnnotationKey" . }}: {{ include "ai-models.dmcrTLSSecretRestartChecksum" . | quote }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "dmcr" "part" "tls")) | nindent 2 }}
type: Opaque
stringData:
  ca.crt: |
{{ $caCert | nindent 4 }}
  ca.key: |
{{ $caKey | nindent 4 }}
  tls.crt: |
{{ $tlsCert | nindent 4 }}
  tls.key: |
{{ $tlsKey | nindent 4 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-models.dmcrCASecretName" . }}
  namespace: {{ $namespace }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "dmcr" "part" "ca")) | nindent 2 }}
type: Opaque
stringData:
  ca.crt: |
{{ $caCert | nindent 4 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-models.dmcrAuthSecretName" . }}
  namespace: {{ $namespace }}
  annotations:
    {{ include "ai-models.dmcrSecretRestartChecksumAnnotationKey" . }}: {{ include "ai-models.dmcrAuthSecretRestartChecksum" . | quote }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "dmcr" "part" "auth-server")) | nindent 2 }}
type: Opaque
stringData:
  write.password: {{ $writePassword | quote }}
  read.password: {{ $readPassword | quote }}
  write.htpasswd: |
{{ $writeHTPasswd | nindent 4 }}
  write.htpasswd.checksum: {{ $writeHTPasswdChecksum | quote }}
  read.htpasswd: |
{{ $readHTPasswd | nindent 4 }}
  read.htpasswd.checksum: {{ $readHTPasswdChecksum | quote }}
  htpasswd: |
{{ printf "%s\n%s" $writeHTPasswd $readHTPasswd | nindent 4 }}
  salt: {{ include "ai-models.dmcrHTTPSalt" . | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-models.dmcrWriteAuthSecretName" . }}
  namespace: {{ $namespace }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "dmcr" "part" "auth-write")) | nindent 2 }}
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
{{ include "ai-models.dmcrDockerConfigJSON" (list . (include "ai-models.dmcrWriteAuthUsername" . | trim) $writePassword) | nindent 4 }}
  username: {{ include "ai-models.dmcrWriteAuthUsername" . | quote }}
  password: {{ $writePassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-models.dmcrReadAuthSecretName" . }}
  namespace: {{ $namespace }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "dmcr" "part" "auth-read")) | nindent 2 }}
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
{{ include "ai-models.dmcrDockerConfigJSON" (list . (include "ai-models.dmcrReadAuthUsername" . | trim) $readPassword) | nindent 4 }}
  username: {{ include "ai-models.dmcrReadAuthUsername" . | quote }}
  password: {{ $readPassword | quote }}
{{- end }}
