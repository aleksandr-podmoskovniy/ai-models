{{- if and (include "ai-models.isEnabled" .) (include "ai-models.hasAPI" (list . "monitoring.coreos.com/v1/ServiceMonitor")) }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "ai-models.dmcrName" . }}
  namespace: {{ include "ai-models.monitoringNamespace" . }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "dmcr" "prometheus" "main")) | nindent 2 }}
spec:
  selector:
    matchLabels:
      {{- include "ai-models.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dmcr
  namespaceSelector:
    matchNames:
      - {{ include "ai-models.namespace" . }}
  endpoints:
    - bearerTokenSecret:
        key: token
        name: prometheus-token
      port: https-metrics
      path: /metrics
      scheme: https
      tlsConfig:
        insecureSkipVerify: true
{{- end }}
