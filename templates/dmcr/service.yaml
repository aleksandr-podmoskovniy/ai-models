{{- if (include "ai-models.isEnabled" .) }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-models.dmcrName" . }}
  namespace: {{ include "ai-models.namespace" . }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "ai-models" "component" "dmcr")) | nindent 2 }}
spec:
  type: ClusterIP
  ports:
    - name: https
      port: 443
      protocol: TCP
      targetPort: https
    - name: https-direct-upload
      port: {{ include "ai-models.dmcrDirectUploadPort" . | int }}
      protocol: TCP
      targetPort: https-direct-upload
    - name: https-metrics
      port: 8002
      protocol: TCP
      targetPort: https-metrics
  selector:
    {{- include "ai-models.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dmcr
{{- end }}
