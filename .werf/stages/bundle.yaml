---
image: bundle
fromImage: builder/scratch
import:
  - image: images-digests-and-version
    add: /
    to: /
    includePaths:
      - images_digests.json
      - version.json
    after: setup
  - image: go-hooks-artifact
    add: /go-hooks
    to: /hooks/go
    after: setup
git:
  - add: /
    to: /
    includePaths:
      - Chart.yaml
      - Chart.lock
      - charts
      - module.yaml
      - oss.yaml
      - .helmignore
      - docs
      - openapi
      - crds
      - monitoring
      - templates
      - README.md
      - README.ru.md
