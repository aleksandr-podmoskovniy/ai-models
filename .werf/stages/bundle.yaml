---
image: bundle
fromImage: builder/scratch
import:
  - image: images-digests-and-version
    add: /
    to: /
    includePaths:
      - images_digests.json
      - version.json
    after: setup
  - image: batch-hooks
    add: /usr/local/bin/batchhooks
    to: /hooks/batchhooks
    after: setup
git:
  - add: /
    to: /
    excludePaths:
      - hooks/batch
    includePaths:
      - Chart.yaml
      - module.yaml
      - oss.yaml
      - .helmignore
      - docs
      - hooks
      - openapi
      - templates
      - README.md
      - README.ru.md
