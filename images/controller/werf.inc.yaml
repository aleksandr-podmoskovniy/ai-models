---
image: controller-src-artifact
final: false
fromImage: builder/src
git:
  - add: /images/controller
    to: /src/images/controller
    stageDependencies:
      install:
        - "**/*"
  - add: /api
    to: /src/api
    stageDependencies:
      install:
        - "**/*"
---
image: controller-build-artifact
final: false
fromImage: builder/golang-bookworm-1.25
import:
  - image: controller-src-artifact
    add: /src
    to: /app
    before: install
{{- if eq (env "WERF_ENABLE_HOST_GO_PKG_CACHE" "true") "true" }}
mount:
  - fromPath: "~/go-pkg-cache"
    to: /go/pkg
{{- end }}
secrets:
  - id: GOPROXY
    value: "{{ .GOPROXY }}"
shell:
  install:
    - export GOPROXY=$(cat /run/secrets/GOPROXY)
{{- include "debian packages proxy" . | nindent 4 }}
    - apt-get install -y --no-install-recommends ca-certificates
{{- include "debian packages clean" . | nindent 4 }}
    - cd /app/images/controller
    - go mod download
  setup:
    - cd /app/images/controller
    - export GOOS=linux
    - export GOARCH=amd64
    - export CGO_ENABLED=0
    - go build -ldflags="-s -w" -a -o /out/ai-models-controller ./cmd/ai-models-controller
    - go build -ldflags="-s -w" -a -o /out/ai-models-artifact-runtime ./cmd/ai-models-artifact-runtime
---
image: controller-kitops-artifact
final: false
fromImage: builder/alt
git:
  - add: /images/controller/install-kitops.sh
    to: /src/install-kitops.sh
    stageDependencies:
      install:
        - install-kitops.sh
  - add: /images/controller/kitops.lock
    to: /src/kitops.lock
    stageDependencies:
      install:
        - kitops.lock
shell:
  beforeInstall:
  {{- include "alt packages proxy" . | nindent 2 }}
    - apt-get install -y ca-certificates curl tar bash
  {{- include "alt packages clean" . | nindent 2 }}
  install:
    - bash /src/install-kitops.sh --metadata /src/kitops.lock --dest /out/kit
    - /out/kit version --show-update-notifications=false >/dev/null
---
image: controller
final: true
fromImage: distroless
import:
  - image: controller-build-artifact
    add: /out/ai-models-controller
    to: /app/ai-models-controller
    after: install
imageSpec:
  config:
    user: 64535
    workingDir: /app
    entrypoint:
      - /app/ai-models-controller
---
image: controller-runtime
final: true
fromImage: distroless
import:
  - image: controller-build-artifact
    add: /out/ai-models-artifact-runtime
    to: /app/ai-models-artifact-runtime
    after: install
  - image: controller-kitops-artifact
    add: /out/kit
    to: /usr/local/bin/kit
    after: install
imageSpec:
  config:
    user: 64535
    workingDir: /app
    entrypoint:
      - /app/ai-models-artifact-runtime
