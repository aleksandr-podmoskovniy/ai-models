---
image: backend-source-artifact
fromImage: src-artifact
final: false
git:
- add: /images/backend/patches
  to: /patches
  stageDependencies:
    install:
    - '**/*'
- add: /images/backend/scripts
  to: /scripts
  stageDependencies:
    install:
    - '**/*'
- add: /images/backend/oidc-auth-patches
  to: /oidc-auth-patches
  stageDependencies:
    install:
    - '**/*'
- add: /images/backend/oidc-auth.lock
  to: /metadata/oidc-auth.lock
  stageDependencies:
    install:
    - '**/*'
- add: /images/backend/upstream.lock
  to: /metadata/upstream.lock
  stageDependencies:
    install:
    - '**/*'
shell:
  install:
  - |
    set -euo pipefail
    apk add --no-cache bash ca-certificates git tar
    bash /scripts/fetch-source.sh --metadata /metadata/upstream.lock --dest /src/backend
    bash /scripts/apply-patches.sh /src/backend /patches

---
image: backend-ui-build
from: node:22.19.0-bookworm-slim@sha256:4a4884e8a44826194dff92ba316264f392056cbe243dcc9fd3551e71cea02b90
final: false
git:
- add: /images/backend/scripts
  to: /scripts
  stageDependencies:
    install:
    - '**/*'
- add: /images/backend/oidc-auth-patches
  to: /oidc-auth-patches
  stageDependencies:
    install:
    - '**/*'
- add: /images/backend/oidc-auth.lock
  to: /metadata/oidc-auth.lock
  stageDependencies:
    install:
    - '**/*'
import:
- image: backend-source-artifact
  add: /src/backend
  to: /src/backend
  before: install
shell:
  install:
  - |
    set -euo pipefail
    bash /scripts/apt-install.sh ca-certificates git python3 make g++
    bash /scripts/build-ui.sh /src/backend

---
image: backend-oidc-auth-ui-build
from: node:22.19.0-bookworm-slim@sha256:4a4884e8a44826194dff92ba316264f392056cbe243dcc9fd3551e71cea02b90
final: false
git:
- add: /images/backend/scripts
  to: /scripts
  stageDependencies:
    install:
    - '**/*'
- add: /images/backend/oidc-auth-patches
  to: /oidc-auth-patches
  stageDependencies:
    install:
    - '**/*'
- add: /images/backend/oidc-auth.lock
  to: /metadata/oidc-auth.lock
  stageDependencies:
    install:
    - '**/*'
shell:
  install:
  - |
    set -euo pipefail
    bash /scripts/apt-install.sh ca-certificates git
    bash /scripts/fetch-oidc-auth-source.sh --metadata /metadata/oidc-auth.lock --dest /src/oidc-auth
    bash /scripts/apply-patches.sh /src/oidc-auth /oidc-auth-patches
    bash /scripts/build-oidc-auth-ui.sh /src/oidc-auth

---
image: backend-release-wheel
from: python:3.10-slim-bullseye@sha256:f1fb49e4d5501ac93d0ca519fb7ee6250842245aba8612926a46a0832a1ed089
final: false
git:
- add: /images/backend/scripts
  to: /scripts
  stageDependencies:
    install:
    - '**/*'
- add: /images/backend/oidc-auth-patches
  to: /oidc-auth-patches
  stageDependencies:
    install:
    - '**/*'
- add: /images/backend/oidc-auth.lock
  to: /metadata/oidc-auth.lock
  stageDependencies:
    install:
    - '**/*'
import:
- image: backend-source-artifact
  add: /src/backend
  to: /src/backend
  before: install
- image: backend-ui-build
  add: /src/backend/mlflow/server/js/build
  to: /ui-build
  before: install
- image: backend-oidc-auth-ui-build
  add: /src/oidc-auth/mlflow_oidc_auth/ui
  to: /oidc-auth-ui
  before: install
shell:
  install:
  - |
    set -euo pipefail
    bash /scripts/apt-install.sh ca-certificates git
    python3 -m pip install --no-cache-dir --upgrade pip
    python3 -m pip install --no-cache-dir build setuptools wheel
    rm -rf /src/backend/mlflow/server/js/build
    cp -a /ui-build /src/backend/mlflow/server/js/build
    bash /scripts/build-distributions.sh /src/backend /dist
    bash /scripts/smoke-release-install.sh /dist

---
image: backend
from: python:3.10-slim-bullseye@sha256:f1fb49e4d5501ac93d0ca519fb7ee6250842245aba8612926a46a0832a1ed089
final: true
git:
- add: /images/backend/scripts
  to: /scripts
  stageDependencies:
    install:
    - '**/*'
- add: /images/backend/oidc-auth-patches
  to: /oidc-auth-patches
  stageDependencies:
    install:
    - '**/*'
- add: /images/backend/oidc-auth.lock
  to: /metadata/oidc-auth.lock
  stageDependencies:
    install:
    - '**/*'
import:
- image: backend-source-artifact
  add: /src/backend
  to: /src/backend
  before: install
- image: backend-ui-build
  add: /src/backend/mlflow/server/js/build
  to: /ui-build
  before: install
- image: backend-oidc-auth-ui-build
  add: /src/oidc-auth/mlflow_oidc_auth/ui
  to: /oidc-auth-ui
  before: install
shell:
  install:
  - |
    set -euo pipefail
    bash /scripts/apt-install.sh ca-certificates git
    python3 -m pip install --no-cache-dir --upgrade pip setuptools wheel
    rm -rf /src/backend/mlflow/server/js/build
    cp -a /ui-build /src/backend/mlflow/server/js/build
    bash /scripts/install-full-from-source.sh /src/backend
    install -m 0755 /scripts/ai_models_backend_runtime.py /usr/local/bin/ai_models_backend_runtime.py
    install -m 0755 /scripts/ai_models_backend_runtime.py /usr/local/bin/ai-models-backend-runtime
    install -m 0755 /scripts/ai-models-backend-db-upgrade.py /usr/local/bin/ai-models-backend-db-upgrade
    install -m 0755 /scripts/ai-models-backend-bootstrap-oidc-auth.py /usr/local/bin/ai-models-backend-bootstrap-oidc-auth
    install -m 0755 /scripts/ai-models-backend-hf-import.py /usr/local/bin/ai-models-backend-hf-import
    install -m 0755 /scripts/ai-models-backend-model-cleanup.py /usr/local/bin/ai-models-backend-model-cleanup
    OIDC_AUTH_PREBUILT_UI_DIR=/oidc-auth-ui bash /scripts/install-oidc-auth-from-source.sh
    python3 -m pip install --no-cache-dir \
      "transformers<5" \
      "huggingface-hub>=0.10.0" \
      sentencepiece \
      safetensors
    printf '%s\n' \
      '#!/bin/sh' \
      'set -eu' \
      '[ -n "${AI_MODELS_S3_ENDPOINT_URL:-}" ] && export MLFLOW_S3_ENDPOINT_URL="${AI_MODELS_S3_ENDPOINT_URL}"' \
      '[ -n "${AI_MODELS_S3_IGNORE_TLS:-}" ] && export MLFLOW_S3_IGNORE_TLS="${AI_MODELS_S3_IGNORE_TLS}"' \
      'exec mlflow "$@"' \
      >/usr/local/bin/ai-models-backend
    chmod +x /usr/local/bin/ai-models-backend
    bash /scripts/smoke-runtime.sh
    rm -rf /root/.cache /src/backend /scripts /ui-build /oidc-auth-ui
