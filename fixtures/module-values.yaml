global:
  enabledModules:
    - ai-models
    - cert-manager
    - managed-postgres
    - user-authn
  modules:
    publicDomainTemplate: "%s.platform.local"
    https:
      mode: CertManager
      certManager:
        clusterIssuerName: letsencrypt
  modulesImages:
    registry:
      base: dev-registry.deckhouse.io/sys/deckhouse-oss/modules/ai-models
      dockercfg: eyJhdXRocyI6e319
    digests:
      aiModels:
        backend: sha256:1111111111111111111111111111111111111111111111111111111111111111
        controller: sha256:2222222222222222222222222222222222222222222222222222222222222222
  discovery:
    clusterDomain: cluster.local
  clusterConfiguration:
    clusterDomain: cluster.local
aiModels:
  postgresql:
    mode: Managed
  artifacts:
    bucket: ai-models
    endpoint: https://s3.internal.local
    accessKey: ai-models-storage
    secretKey: ai-models-storage-secret
  publicationRegistry:
    repositoryPrefix: registry.internal.local/ai-models
    username: ai-models-publisher
    password: ai-models-publisher-secret
