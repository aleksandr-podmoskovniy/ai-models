giterminismConfigVersion: 1
config:
  goTemplateRendering:
    allowEnvVariables:
      - /CI_.+/
      - GOPROXY
      - MODULES_MODULE_TAG
      - MODULES_MODULE_NAME
      - WERF_MODULE_NAME
      - STAGED_DOCKERFILE
      - WERF_ENABLE_HOST_GO_PKG_CACHE
      - SOURCE_REPO
      - SOURCE_REPO_GIT
      - DISTRO_PACKAGES_PROXY
  stapel:
    mount:
      allowBuildDir: true
      allowFromPaths:
        - ~/go-pkg-cache
  secrets:
    allowValueIds:
      - GOPROXY
  allowUncommittedFiles:
    - "build/base-images/deckhouse_images.yml"
helm:
  allowUncommittedFiles:
    - "Chart.lock"
    - "charts/*.tgz"
    - ".helmignore"
