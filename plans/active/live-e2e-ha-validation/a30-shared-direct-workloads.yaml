apiVersion: v1
kind: Namespace
metadata:
  name: ai-models-e2e
  labels:
    ai.deckhouse.io/live-e2e: ha-validation
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-a30-embed
  namespace: ai-models-e2e
  labels:
    app.kubernetes.io/name: vllm-a30-embed
    ai.deckhouse.io/live-e2e: ha-validation
  annotations:
    ai.deckhouse.io/model-refs: model=ClusterModel/a30-user-bge-m3
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm-a30-embed
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm-a30-embed
        observability.apiac.ru/service: vllm-a30-embed
        ai.deckhouse.io/live-e2e: ha-validation
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: k8s-w3-gpu.apiac.ru
        node.deckhouse.io/group: w-gpu-mig
      tolerations:
        - key: dedicated.apiac.ru
          operator: Equal
          value: w-gpu
          effect: NoExecute
      containers:
        - name: vllm
          image: rayproject/ray-llm:2.54.0-py311-cu128
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - >
              exec vllm serve /data/modelcache/models/model
              --runner pooling
              --convert embed
              --served-model-name a30-user-bge-m3
              --host 0.0.0.0
              --port 8000
              --dtype float16
              --gpu-memory-utilization 0.55
              --max-model-len 2048
              --max-num-seqs 8
              --max-num-batched-tokens 2048
              --enforce-eager
          env:
            - name: HF_HOME
              value: /tmp/hf
            - name: HF_HUB_DISABLE_XET
              value: "1"
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: VLLM_TARGET_DEVICE
              value: cuda
          ports:
            - name: http
              containerPort: 8000
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 90
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: "1000m"
              memory: 3Gi
              gpu.deckhouse.io/a30-mig-1g6: "1"
            limits:
              cpu: "2000m"
              memory: 6Gi
              gpu.deckhouse.io/a30-mig-1g6: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-a30-embed
  namespace: ai-models-e2e
  labels:
    app.kubernetes.io/name: vllm-a30-embed
    ai.deckhouse.io/live-e2e: ha-validation
spec:
  selector:
    app.kubernetes.io/name: vllm-a30-embed
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
