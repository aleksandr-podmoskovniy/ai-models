x-extend:
  schema: config-values.yaml
type: object
properties:
  logLevel:
    type: string
    description: Logging level used by ai-models runtime components.
    default: "Info"
    enum:
      - "Debug"
      - "Info"
      - "Warn"
      - "Error"
  artifacts:
    type: object
    description: Stable S3-compatible artifact storage settings exposed by ai-models.
    additionalProperties: false
    default:
      bucket: ""
      endpoint: ""
      region: us-east-1
      credentialsSecretName: ""
      sourceFetchMode: Direct
      caSecretName: ""
      insecure: false
      usePathStyle: true
    properties:
      bucket:
        type: string
        default: ""
      endpoint:
        type: string
        default: ""
      region:
        type: string
        default: us-east-1
      credentialsSecretName:
        type: string
        default: ""
      sourceFetchMode:
        type: string
        default: Direct
        enum:
          - Mirror
          - Direct
        description: Remote source fetch mode used for `spec.source.url` ingestion.
      caSecretName:
        type: string
        default: ""
      insecure:
        type: boolean
        default: false
      usePathStyle:
        type: boolean
        default: true
  nodeCache:
    type: object
    description: Managed node-local cache substrate settings exposed by ai-models.
    additionalProperties: false
    default:
      enabled: false
      maxSize: 200Gi
      fallbackVolumeSize: 32Gi
      sharedVolumeSize: 64Gi
      storageClassName: ai-models-node-cache
      volumeGroupSetName: ai-models-node-cache
      volumeGroupNameOnNode: ai-models-cache
      thinPoolName: model-cache
      nodeSelector: {}
      blockDeviceSelector: {}
    properties:
      enabled:
        type: boolean
        default: false
      maxSize:
        type: string
        default: 200Gi
      fallbackVolumeSize:
        type: string
        default: 32Gi
      sharedVolumeSize:
        type: string
        default: 64Gi
      storageClassName:
        type: string
        default: ai-models-node-cache
      volumeGroupSetName:
        type: string
        default: ai-models-node-cache
      volumeGroupNameOnNode:
        type: string
        default: ai-models-cache
      thinPoolName:
        type: string
        default: model-cache
      nodeSelector:
        type: object
        default: {}
        additionalProperties:
          type: string
      blockDeviceSelector:
        type: object
        default: {}
        additionalProperties:
          type: string
  registry:
    type: object
    description: Registry credentials injected by Deckhouse runtime.
    default: {}
    properties:
      dockercfg:
        type: string
        description: Base64-encoded docker config json used for the module image pull secret.
    additionalProperties: false
  internal:
    type: object
    description: |
      Internal runtime values used by templates.
      Following the virtualization-style split, runtime/materializer adapter
      wiring belongs here rather than in `config-values.yaml`.
    default: {}
    properties:
      customCertificateData:
        type: object
        description: Copied custom certificate data prepared by the module Go hook for CustomCertificate mode.
        properties:
          tls.crt:
            type: string
          tls.key:
            type: string
          ca.crt:
            type: string
      discoveredDexCA:
        type: string
        description: CA certificate discovered from platform ingress wiring and reused for module trust propagation.
      moduleConfig:
        type: object
        description: Normalized module configuration consumed by runtime components.
        default:
          logLevel: Info
          artifacts:
            bucket: ""
            endpoint: ""
            region: us-east-1
            credentialsSecretName: ""
            sourceFetchMode: Direct
            caSecretName: ""
            insecure: false
            usePathStyle: true
          nodeCache:
            enabled: false
            maxSize: 200Gi
            fallbackVolumeSize: 32Gi
            sharedVolumeSize: 64Gi
            storageClassName: ai-models-node-cache
            volumeGroupSetName: ai-models-node-cache
            volumeGroupNameOnNode: ai-models-cache
            thinPoolName: model-cache
            nodeSelector: {}
            blockDeviceSelector: {}
        additionalProperties: true
      conditions:
        type: array
        description: Module status conditions reported to Deckhouse.
        items:
          type: object
          additionalProperties: true
      registry:
        type: object
        description: Registry-related computed values.
        default:
          secretName: ai-models-module-registry
        properties:
          secretName:
            type: string
            description: Name of the module registry secret rendered into the module namespace.
            default: ai-models-module-registry
        additionalProperties: false
      artifacts:
        type: object
        description: Runtime-only S3 artifact storage wiring for ai-models.
        default:
          bucket: ""
          endpoint: ""
          region: us-east-1
          syncedCredentialsSecretName: ai-models-artifacts
          mountedCASecretName: ""
          insecure: false
          usePathStyle: true
        properties:
          bucket:
            type: string
            default: ""
          endpoint:
            type: string
            default: ""
          region:
            type: string
            default: us-east-1
          syncedCredentialsSecretName:
            type: string
            default: ai-models-artifacts
          mountedCASecretName:
            type: string
            default: ""
          insecure:
            type: boolean
            default: false
          usePathStyle:
            type: boolean
            default: true
        additionalProperties: true
      dmcr:
        type: object
        description: Runtime-only internal DMCR state controlled by hooks and controller cleanup flow.
        default:
          garbageCollectionModeEnabled: false
        properties:
          garbageCollectionModeEnabled:
            type: boolean
            default: false
        additionalProperties: false
      publicationRuntime:
        type: object
        description: Runtime-only publish worker scheduling and bounded writable-layer settings.
        default:
          maxConcurrentWorkers: 1
          resources:
            requests:
              cpu: "1"
              memory: 8Gi
              ephemeral-storage: 1Gi
            limits:
              cpu: "4"
              memory: 16Gi
              ephemeral-storage: 1Gi
        additionalProperties: true
      ingress:
        type: object
        description: Runtime-only ingress wiring derived from platform defaults and module runtime logic.
        default:
          host: ai-models
          path: /
          className: ""
          tlsSecretName: ingress-tls
        additionalProperties: true
    additionalProperties: true
additionalProperties: false
