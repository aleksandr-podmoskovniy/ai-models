x-extend:
  schema: config-values.yaml
type: object
properties:
  logLevel:
    type: string
    description: Logging level used by ai-models runtime components.
    default: "Info"
    enum:
      - "Debug"
      - "Info"
      - "Warn"
      - "Error"
  artifacts:
    type: object
    description: Stable S3-compatible artifact storage settings exposed by ai-models.
    additionalProperties: false
    default:
      bucket: ""
      endpoint: ""
      region: us-east-1
      credentialsSecretName: ""
      caSecretName: ""
      capacityLimit: ""
      insecure: false
      usePathStyle: true
    properties:
      bucket:
        type: string
        default: ""
      endpoint:
        type: string
        default: ""
      region:
        type: string
        default: us-east-1
      credentialsSecretName:
        type: string
        default: ""
      caSecretName:
        type: string
        default: ""
      capacityLimit:
        type: string
        default: ""
        description: Optional total module-owned artifact storage capacity budget.
      insecure:
        type: boolean
        default: false
      usePathStyle:
        type: boolean
        default: true
  nodeCache:
    type: object
    description: SDS-backed managed node-local cache substrate settings exposed by ai-models.
    additionalProperties: false
    default:
      enabled: false
      size: 200Gi
      nodeSelector:
        ai.deckhouse.io/model-cache: "true"
      blockDeviceSelector:
        ai.deckhouse.io/model-cache: "true"
    properties:
      enabled:
        type: boolean
        default: false
      size:
        type: string
        default: 200Gi
      nodeSelector:
        type: object
        default:
          ai.deckhouse.io/model-cache: "true"
        additionalProperties:
          type: string
      blockDeviceSelector:
        type: object
        default:
          ai.deckhouse.io/model-cache: "true"
        additionalProperties:
          type: string
  registry:
    type: object
    description: Registry credentials injected by Deckhouse runtime.
    default: {}
    properties:
      dockercfg:
        type: string
        description: Base64-encoded docker config json used for the module image pull secret.
    additionalProperties: false
  internal:
    type: object
    description: |
      Internal runtime values used by templates.
      Following the virtualization-style split, runtime/materializer adapter
      wiring belongs here rather than in `config-values.yaml`.
    default: {}
    properties:
      customCertificateData:
        type: object
        description: Copied custom certificate data prepared by the module Go hook for CustomCertificate mode.
        properties:
          tls.crt:
            type: string
          tls.key:
            type: string
          ca.crt:
            type: string
      discoveredDexCA:
        type: string
        description: CA certificate discovered from platform ingress wiring and reused for module trust propagation.
      rootCA:
        type: object
        description: Common module root CA generated by hooks and used to sign internal ai-models TLS certificates.
        default:
          ca: ""
          crt: ""
          key: ""
        properties:
          ca:
            type: string
            default: ""
          crt:
            type: string
            default: ""
          key:
            type: string
            default: ""
        additionalProperties: false
      moduleConfig:
        type: object
        description: Normalized module configuration consumed by runtime components.
        default:
          logLevel: Info
          artifacts:
            bucket: ""
            endpoint: ""
            region: us-east-1
            credentialsSecretName: ""
            caSecretName: ""
            insecure: false
            usePathStyle: true
          nodeCache:
            enabled: false
            size: 200Gi
            nodeSelector:
              ai.deckhouse.io/model-cache: "true"
            blockDeviceSelector:
              ai.deckhouse.io/model-cache: "true"
        additionalProperties: true
      controller:
        type: object
        description: Internal controller runtime wiring.
        default:
          cert:
            ca: ""
            crt: ""
            key: ""
        properties:
          cert:
            type: object
            description: Self-signed TLS data generated by the module hook for controller webhooks.
            default:
              ca: ""
              crt: ""
              key: ""
            properties:
              ca:
                type: string
                default: ""
              crt:
                type: string
                default: ""
              key:
                type: string
                default: ""
            additionalProperties: false
        additionalProperties: false
      conditions:
        type: array
        description: Module status conditions reported to Deckhouse.
        items:
          type: object
          additionalProperties: true
      registry:
        type: object
        description: Registry-related computed values.
        default:
          secretName: ai-models-module-registry
        properties:
          secretName:
            type: string
            description: Name of the module registry secret rendered into the module namespace.
            default: ai-models-module-registry
        additionalProperties: false
      artifacts:
        type: object
        description: Runtime-only S3 artifact storage wiring for ai-models.
        default:
          bucket: ""
          endpoint: ""
          region: us-east-1
          syncedCredentialsSecretName: ai-models-artifacts
          mountedCASecretName: ""
          insecure: false
          usePathStyle: true
        properties:
          bucket:
            type: string
            default: ""
          endpoint:
            type: string
            default: ""
          region:
            type: string
            default: us-east-1
          syncedCredentialsSecretName:
            type: string
            default: ai-models-artifacts
          mountedCASecretName:
            type: string
            default: ""
          insecure:
            type: boolean
            default: false
          usePathStyle:
            type: boolean
            default: true
        additionalProperties: true
      dmcr:
        type: object
        description: Runtime-only DMCR wiring and cleanup settings.
        default:
          auth:
            writePassword: ""
            readPassword: ""
            writeHtpasswd: ""
            readHtpasswd: ""
            salt: ""
          cert:
            ca: ""
            crt: ""
            key: ""
          gc:
            schedule: "*/20 * * * *"
        properties:
          auth:
            type: object
            description: Basic-auth state generated by the module hook for DMCR.
            default:
              writePassword: ""
              readPassword: ""
              writeHtpasswd: ""
              readHtpasswd: ""
              salt: ""
            properties:
              writePassword:
                type: string
                default: ""
              readPassword:
                type: string
                default: ""
              writeHtpasswd:
                type: string
                default: ""
              readHtpasswd:
                type: string
                default: ""
              salt:
                type: string
                default: ""
            additionalProperties: false
          cert:
            type: object
            description: Self-signed TLS data generated by the module hook for DMCR.
            default:
              ca: ""
              crt: ""
              key: ""
            properties:
              ca:
                type: string
                default: ""
              crt:
                type: string
                default: ""
              key:
                type: string
                default: ""
            additionalProperties: false
          gc:
            type: object
            additionalProperties: false
            default:
              schedule: "*/20 * * * *"
            properties:
              schedule:
                type: string
                default: "*/20 * * * *"
        additionalProperties: false
      publicationRuntime:
        type: object
        description: Runtime-only publish worker scheduling and bounded writable-layer settings.
        default:
          maxConcurrentWorkers: 4
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
              ephemeral-storage: 1Gi
            limits:
              cpu: "4"
              memory: 2Gi
              ephemeral-storage: 1Gi
        additionalProperties: true
      ingress:
        type: object
        description: Runtime-only ingress wiring derived from platform defaults and module runtime logic.
        default:
          host: ai-models
          path: /
          className: ""
          tlsSecretName: ingress-tls
        additionalProperties: true
    additionalProperties: true
additionalProperties: false
