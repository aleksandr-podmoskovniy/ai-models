type: object
required:
  - artifacts
description: |
  User-facing configuration for the ai-models module.

  The module exposes only stable settings that are specific to ai-models runtime.
  Runtime/materializer implementation details do not belong here and must stay
  in internal values and templates, following the same split used by
  virtualization.
  High availability mode, HTTPS policy, and ingress class are taken from global
  Deckhouse configuration and internal module wiring.
properties:
  logLevel:
    type: string
    description: Logging level used by ai-models runtime components.
    default: "Info"
    enum:
      - "Debug"
      - "Info"
      - "Warn"
      - "Error"
  artifacts:
    type: object
    required:
      - bucket
      - endpoint
      - credentialsSecretName
    description: |
      Shared S3-compatible storage used by ai-models.
      Controller-owned upload staging always uses the fixed `raw/` subtree in
      the same bucket when the module needs temporary source objects. The
      internal DMCR publication plane writes fixed `dmcr/` objects. Prefixes
      are module-owned and are not configurable.
    additionalProperties: false
    properties:
      bucket:
        type: string
        description: Bucket name shared by upload staging, temporary source objects, and published model bytes.
        default: ""
      endpoint:
        type: string
        description: S3-compatible endpoint URL.
        default: ""
      region:
        type: string
        description: S3 region value used by the client.
        default: us-east-1
      credentialsSecretName:
        type: string
        description: |
          Existing Secret in `d8-system` with `accessKey` and `secretKey`.
          The module copies only these keys into its own service namespace
          before rendering workloads, so users do not manage credentials
          directly in `d8-ai-models`. This Secret is required; inline
          credentials are not supported.
        default: ""
      caSecretName:
        type: string
        description: |
          Optional existing Secret in `d8-system` with key `ca.crt` used to trust
          a custom CA for the S3-compatible endpoint. The module copies that CA
          into its own service namespace. When empty, ai-models first reuses
          `credentialsSecretName` if that Secret also contains `ca.crt`.
        default: ""
      capacityLimit:
        type: string
        description: |
          Optional total module-owned artifact storage capacity budget, for
          example `500Gi`. When set, upload sessions must declare `sizeBytes`
          and the upload gateway reserves capacity before multipart staging.
          Empty value disables admission enforcement and reports capacity as
          unknown.
        default: ""
      insecure:
        type: boolean
        description: Disable TLS verification for S3-compatible endpoint access.
        default: false
      usePathStyle:
        type: boolean
        description: Use path-style S3 requests.
        default: true
  nodeCache:
    type: object
    additionalProperties: false
    description: |
      Managed node-local cache substrate settings.
      This slice owns the SDS-backed local storage substrate for the
      node-local cache runtime and removes the need to create `LocalStorageClass`
      manually. When enabled it requires Deckhouse `sds-node-configurator` and
      `sds-local-volume` modules. Managed workloads without an explicit cache
      volume are delivered through the workload-facing SharedDirect node-cache
      path. Internal storage object names are fixed by the module.

      By default ai-models selects nodes and `BlockDevice` objects labelled
      `ai.deckhouse.io/model-cache=true`. Override selectors only when the
      cluster already has a stricter placement labelling convention.
    properties:
      enabled:
        type: boolean
        description: Enable ai-models-managed node-local cache substrate.
        default: false
      size:
        type: string
        description: |
          Per-node cache size. The same value is used for the managed thin-pool
          budget and for the per-node shared cache PVC requested by the
          node-cache runtime.
        default: 200Gi
      nodeSelector:
        type: object
        description: MatchLabels selector for nodes that should host managed node-local cache substrate.
        default:
          ai.deckhouse.io/model-cache: "true"
        additionalProperties:
          type: string
      blockDeviceSelector:
        type: object
        description: MatchLabels selector for BlockDevice resources used to build the managed cache VG.
        default:
          ai.deckhouse.io/model-cache: "true"
        additionalProperties:
          type: string
  sharedPVC:
    type: object
    additionalProperties: false
    description: |
      RWX shared-volume delivery settings used only when `nodeCache.enabled=false`.
      This is the universal network-storage delivery mode for clusters without
      local cache disks. The StorageClass must support `ReadWriteMany`
      semantics, for example CephFS, NFS, or another shared filesystem.
    properties:
      storageClassName:
        type: string
        description: |
          RWX StorageClass name for controller-owned SharedPVC workload
          delivery. Empty value disables SharedPVC and keeps annotated
          workloads fail-closed when node cache is disabled.
        default: ""
additionalProperties: false
