type: object
required:
  - artifacts
description: |
  User-facing configuration for the ai-models module.

  The module exposes only stable settings that are specific to ai-models runtime.
  Runtime/materializer implementation details do not belong here and must stay
  in internal values and templates, following the same split used by
  virtualization.
  High availability mode, HTTPS policy, and ingress class are taken from global
  Deckhouse configuration and internal module wiring.
properties:
  logLevel:
    type: string
    description: Logging level used by ai-models runtime components.
    default: "Info"
    enum:
      - "Debug"
      - "Info"
      - "Warn"
      - "Error"
  artifacts:
    type: object
    required:
      - bucket
      - endpoint
      - credentialsSecretName
    description: |
      Shared S3-compatible storage used by ai-models.
      Controller-owned upload staging always uses the fixed `raw/` subtree in
      the same bucket. Remote source mirror uses that subtree only in `Mirror`
      mode. The internal DMCR publication plane writes fixed `dmcr/` objects.
    additionalProperties: false
    properties:
      bucket:
        type: string
        description: Bucket name shared by upload staging, source mirror state, and published model bytes.
        default: ""
      endpoint:
        type: string
        description: S3-compatible endpoint URL.
        default: ""
      region:
        type: string
        description: S3 region value used by the client.
        default: us-east-1
      credentialsSecretName:
        type: string
        description: |
          Existing Secret in `d8-system` with `accessKey` and `secretKey`.
          The module copies only these keys into its own service namespace
          before rendering workloads, so users do not manage credentials
          directly in `d8-ai-models`. This Secret is required; inline
          credentials are not supported.
        default: ""
      sourceFetchMode:
        type: string
        enum:
          - Mirror
          - Direct
        default: Direct
        description: |
          Cluster-level remote source fetch mode for publication workers.
          This setting applies only to remote `spec.source.url` ingestion.
          `Mirror` first stores selected remote source files in controller-owned
          object storage under `raw/` and then publishes from that durable
          temporary copy when the source adapter supports it. `Direct`
          publishes from the canonical source boundary directly without the
          intermediate mirror copy.
      caSecretName:
        type: string
        description: |
          Optional existing Secret in `d8-system` with key `ca.crt` used to trust
          a custom CA for the S3-compatible endpoint. The module copies that CA
          into its own service namespace. When empty, ai-models first reuses
          `credentialsSecretName` if that Secret also contains `ca.crt`.
        default: ""
      insecure:
        type: boolean
        description: Disable TLS verification for S3-compatible endpoint access.
        default: false
      usePathStyle:
        type: boolean
        description: Use path-style S3 requests.
        default: true
  dmcr:
    type: object
    additionalProperties: false
    description: |
      Stable DMCR maintenance settings exposed by ai-models.
      These settings productize the stale sweep for published repository
      metadata, source-mirror prefixes, and orphan direct-upload residue
      without exposing internal secret-driven maintenance choreography as a
      public contract.
    properties:
      gc:
        type: object
        additionalProperties: false
        description: Parameters for DMCR stale sweep and garbage collection.
        properties:
          schedule:
            type: string
            default: "*/20 * * * *"
            description: |
              Cron schedule for periodic DMCR stale sweep of published model
              repositories, source mirrors, and orphan direct-upload residue.
              The default is every 20 minutes. Set an empty string to disable
              periodic sweep. Operators can still run `dmcr-cleaner gc check`
              for report-only inspection inside the DMCR Pod.
  nodeCache:
    type: object
    additionalProperties: false
    description: |
      Managed node-local cache substrate settings.
      This slice owns the local storage substrate for the forthcoming node-local
      cache runtime and removes the need to create `LocalStorageClass`
      manually. The current workload delivery path still materializes into
      workload-owned `/data/modelcache`.
    properties:
      enabled:
        type: boolean
        description: Enable ai-models-managed node-local cache substrate.
        default: false
      maxSize:
        type: string
        description: Per-node cache substrate size used as thin-pool budget.
        default: 200Gi
      fallbackVolumeSize:
        type: string
        description: |
          Size of the managed local ephemeral volume automatically injected into
          annotated workloads for the current init-container fallback delivery
          path when they do not bring their own `/data/modelcache` volume.
        default: 32Gi
      sharedVolumeSize:
        type: string
        description: |
          Size of the per-node shared cache volume used by the module-owned
          node-cache runtime `DaemonSet` for prefetch and maintenance of the
          shared node-local digest store.
        default: 64Gi
      storageClassName:
        type: string
        description: Name of the managed `LocalStorageClass` created by ai-models.
        default: ai-models-node-cache
      volumeGroupSetName:
        type: string
        description: Name of the managed `LVMVolumeGroupSet`.
        default: ai-models-node-cache
      volumeGroupNameOnNode:
        type: string
        description: Actual VG name created on each selected node for the managed cache substrate.
        default: ai-models-cache
      thinPoolName:
        type: string
        description: Thin-pool name created inside the managed VG for cache capacity budgeting.
        default: model-cache
      nodeSelector:
        type: object
        description: MatchLabels selector for nodes that should host managed node-local cache substrate.
        default: {}
        additionalProperties:
          type: string
      blockDeviceSelector:
        type: object
        description: MatchLabels selector for BlockDevice resources used to build the managed cache VG.
        default: {}
        additionalProperties:
          type: string
additionalProperties: false
